terms = "<b>Nutzungsbedingungen</b>\n\nMit der Nutzung dieses Bots stimmst du Folgendem zu:\n\n• Dieser Bot bietet Bilderrückwärtssuche als Service an. Ergebnisse hängen von Drittanbieter-Engines ab und sind möglicherweise nicht immer korrekt.\n• <b>Keine illegalen Inhalte.</b> Das Hochladen illegaler Inhalte ist verboten, einschliesslich aber nicht beschränkt auf CSAM, Inhalte die gegen geltendes Recht verstossen, oder Inhalte zu deren Verbreitung du nicht berechtigt bist. Verstösse führen zu einem sofortigen und permanenten Bann.\n• Premium-Abos sind nicht erstattungsfähig. Alle Käufe sind endgültig. Kontaktiere /paysupport für zahlungsbezogene Anfragen.\n• Der Bot wird ohne Gewährleistung bereitgestellt.\n• <b>Datenspeicherung:</b> Hochgeladene Bilder werden bis zu 30 Tage gespeichert, um die Suchfunktion bereitzustellen (z.B. damit Suchmaschinen das Bild abrufen können). Nach 30 Tagen werden Bilder automatisch gelöscht.\n• Missbrauch kann zu einer Sperre führen.\n• Der Telegram-Support kann bei Bot-Käufen nicht helfen — nutze stattdessen /paysupport."
paysupport = "📬 <b>Support</b>\n\nBei Fragen, Problemen oder Erstattungsanfragen:\n\n• Issue erstellen: <a href=\"https://github.com/Nachtalb/reverse_image_search_bot/issues\">GitHub Issues</a>\n• Entwickler kontaktieren: @Nachtalb\n\nBitte beachte, dass der Telegram-Support nicht bei Bot-Käufen helfen kann."

