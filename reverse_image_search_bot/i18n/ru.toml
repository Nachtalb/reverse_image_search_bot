terms = "<b>Условия использования</b>\n\nИспользуя этого бота, вы соглашаетесь со следующим:\n\n• Этот бот предоставляет обратный поиск изображений. Результаты зависят от сторонних движков и могут быть не всегда точными.\n• <b>Запрещён незаконный контент.</b> Загрузка незаконного контента запрещена, включая CSAM, контент нарушающий действующее законодательство, или контент на распространение которого у вас нет прав. Нарушения приведут к немедленному и перманентному бану.\n• Премиум-подписки не подлежат возврату, за исключением случаев, предусмотренных законом. Обращайтесь в /support для запросов на возврат.\n• Бот предоставляется как есть, без гарантий.\n• <b>Хранение данных:</b> Загруженные изображения хранятся до 30 дней для обеспечения функции поиска. После 30 дней изображения автоматически удаляются.\n• Злоупотребление может привести к бану.\n• Поддержка Telegram не может помочь с покупками через бота — используйте /support."
support = "📬 <b>Поддержка</b>\n\nПо вопросам или запросам на возврат:\n\n• Создать issue: <a href=\"https://github.com/Nachtalb/reverse_image_search_bot/issues\">GitHub Issues</a>\n• Связаться с разработчиком: @Nachtalb"
