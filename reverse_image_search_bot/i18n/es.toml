terms = "<b>Términos de Servicio</b>\n\nAl usar este bot aceptas lo siguiente:\n\n• Este bot ofrece búsqueda inversa de imágenes. Los resultados dependen de motores de terceros y pueden no ser siempre precisos.\n• <b>Sin contenido ilegal.</b> No debes subir contenido ilegal, incluyendo pero no limitado a CSAM, contenido que viole las leyes aplicables o contenido que no tengas derecho a distribuir. Las violaciones resultarán en un baneo inmediato y permanente.\n• Las suscripciones premium no son reembolsables excepto donde lo exija la ley. Contacta /support para solicitudes de reembolso.\n• El bot se proporciona tal cual, sin garantía.\n• <b>Retención de datos:</b> Las imágenes subidas se almacenan hasta 30 días para proporcionar la función de búsqueda. Después de 30 días, se eliminan automáticamente.\n• El abuso puede resultar en un baneo.\n• El soporte de Telegram no puede ayudar con compras del bot — usa /support."
