<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Abuse Reports</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #17181c; color: #e8e8ea; font-size: 15px; line-height: 1.45;
  }
  header { padding: 16px; border-bottom: 1px solid #2a2c33; position: sticky; top: 0; background: #17181c; z-index: 5; }
  h1 { font-size: 17px; margin: 0 0 4px; }
  .sub { color: #9a9ba2; font-size: 13px; }
  main { padding: 16px; }
  .card { background: #1f2128; border: 1px solid #2a2c33; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: #9a9ba2; margin-bottom: 6px; }
  input[type=password], input[type=text] {
    width: 100%; padding: 11px 12px; border-radius: 9px; border: 1px solid #363842;
    background: #14151a; color: #e8e8ea; font-size: 15px;
  }
  button {
    border: none; border-radius: 9px; padding: 11px 16px; font-size: 15px; font-weight: 600;
    cursor: pointer; background: #3a6df0; color: #fff;
  }
  button.ghost { background: transparent; color: #9a9ba2; border: 1px solid #363842; }
  button:disabled { opacity: .5; cursor: default; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .muted { color: #9a9ba2; font-size: 12px; }
  .hidden { display: none; }
  .rep {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 11px 12px; border: 1px solid #2a2c33; border-radius: 10px; margin-bottom: 8px;
    background: #1b1d23; cursor: pointer;
  }
  .rep:hover { border-color: #3a6df0; }
  .rep .who { font-weight: 600; }
  .rep .meta { font-size: 12px; color: #9a9ba2; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; }
  .badge.ready, .badge.preparing { background: #103a2a; color: #7fd6a2; }
  .badge.submitting { background: #4a3a10; color: #f0c674; }
  .badge.filed { background: #0f2f5a; color: #8ab4ff; }
  .badge.cancelled, .badge.error, .badge.retracted, .badge.review { background: #3a1c1c; color: #f0a0a0; }
  .err { color: #f08a8a; font-size: 13px; margin-top: 8px; }
  code { background: #2a2c33; padding: 1px 5px; border-radius: 4px; }
  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 9px; background: #1f2128; border: 1px solid #2a2c33; color: #9a9ba2; cursor: pointer; font-weight: 600; }
  .tab.active { background: #3a6df0; color: #fff; border-color: #3a6df0; }
  /* Status filter dropdown */
  select { padding: 9px 11px; border-radius: 9px; border: 1px solid #363842; background: #14151a; color: #e8e8ea; font-size: 14px; }
  /* Stats */
  .stat-counter { font-size: 44px; font-weight: 800; line-height: 1; color: #8ab4ff; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .stat-box { background: #1b1d23; border: 1px solid #2a2c33; border-radius: 10px; padding: 14px; }
  .stat-box .n { font-size: 28px; font-weight: 800; color: #8ab4ff; }
  .stat-box .l { font-size: 12px; color: #9a9ba2; margin-top: 2px; }
  .n2 { font-size: 22px; font-weight: 700; color: #cfd0d6; }
  /* Language pie + toggle chips */
  #st-pie path { cursor: default; transition: opacity .12s; }
  .lang-chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 999px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; color: #fff; user-select: none; }
  .lang-chip.off { opacity: .32; }
  .lang-chip .tick { font-size: 12px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; font-size: 13px; }
  .bar-row .lbl { width: 92px; flex-shrink: 0; color: #cfd0d6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-row .bar { height: 16px; background: #3a6df0; border-radius: 4px; min-width: 2px; }
  .bar-row .val { color: #9a9ba2; font-size: 12px; }
  /* Heatmap: 7 rows (Sun–Sat) × 24 hour cols */
  .heat { overflow-x: auto; }
  .heat table { border-collapse: collapse; }
  .heat td, .heat th { width: 15px; height: 15px; text-align: center; font-size: 9px; color: #6a6c76; padding: 0; }
  .heat th.hh { font-size: 8px; }
  .heat td.cell { border-radius: 2px; outline: 1px solid #14151a; }
  .heat td.day { width: 30px; color: #9a9ba2; font-size: 10px; text-align: right; padding-right: 5px; }
</style>
</head>
<body>
<header>
  <h1>Abuse Reports</h1>
  <div class="sub" id="hdr-sub">Locked</div>
</header>
<main>
  <!-- Global page password gate -->
  <div class="card" id="unlock-card">
    <input type="password" id="p2" autocomplete="off" placeholder="Report page password">
    <div style="height:10px"></div>
    <button id="unlock-btn">Unlock</button>
    <div class="err" id="unlock-err"></div>
  </div>

  <div id="body" class="hidden">
    <div class="tabs">
      <div class="tab active" id="tab-reports" data-tab="reports">Reports</div>
      <div class="tab" id="tab-stats" data-tab="stats">Statistics</div>
    </div>

    <!-- ============ REPORTS TAB ============ -->
    <div id="pane-reports">
      <!-- Create a new report -->
      <div class="card">
        <label for="target">Create a new report</label>
        <div class="row">
          <input type="text" id="target" placeholder="user id, @username, or filename" style="flex:1;min-width:180px">
          <button id="create-btn">Create</button>
        </div>
        <div class="err" id="create-err"></div>
        <div id="create-ok" class="hidden" style="margin-top:10px"></div>
      </div>

      <!-- Report list -->
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <b>All reports</b>
          <div class="row">
            <select id="status-filter" title="Filter by status">
              <option value="">All statuses</option>
              <option value="filed">Filed</option>
              <option value="ready">Ready</option>
              <option value="preparing">Preparing</option>
              <option value="review">Review</option>
              <option value="submitting">Submitting</option>
              <option value="cancelled">Cancelled</option>
              <option value="retracted">Retracted</option>
              <option value="error">Error</option>
            </select>
            <button class="ghost" id="refresh-btn">Refresh</button>
          </div>
        </div>
        <div id="list" style="margin-top:10px"></div>
      </div>
    </div>

    <!-- ============ STATISTICS TAB ============ -->
    <div id="pane-stats" class="hidden">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:stretch;gap:12px;flex-wrap:nowrap">
          <div style="display:flex;flex-direction:column;justify-content:space-between;min-height:120px;flex:1;min-width:0">
            <div>
              <div class="muted">Total files reported</div>
              <div class="stat-counter" id="st-counter">—</div>
            </div>
            <div class="row" id="st-filebreak" style="gap:0;margin-top:8px;align-items:center;flex-wrap:wrap"></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0">
            <select id="st-year" title="Year"></select>
            <select id="st-month" title="Month"></select>
          </div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-box"><div class="n" id="st-reports">—</div><div class="l">Reports filed</div></div>
        <div class="stat-box"><div class="n" id="st-users">—</div><div class="l">Unique users reported</div></div>
      </div>

      <div class="card">
        <b>Languages</b>
        <div id="st-pie-wrap" style="display:flex;justify-content:center;margin:12px 0">
          <svg id="st-pie" viewBox="0 0 200 200" width="220" height="220" role="img"></svg>
        </div>
        <div class="row" id="st-lang-chips" style="justify-content:center"></div>
      </div>

      <div class="card">
        <b>Posting Time</b>
        <div class="heat" id="st-heat" style="margin-top:10px"></div>
      </div>

      <div class="err" id="st-err"></div>
    </div>
  </div>
</main>

<script>
const TG = window.Telegram && window.Telegram.WebApp;
if (TG) { TG.ready(); TG.expand(); }
// This IS the overview — clear the "came from console" flag and hide any Back
// button Telegram may still be showing from a previous report page.
try { sessionStorage.removeItem("ris_from_console"); } catch (e) {}
if (TG && TG.BackButton) TG.BackButton.hide();
const INIT = (TG && TG.initData) || "";
let P2 = "";

const $ = id => document.getElementById(id);
const api = async (path, opts = {}) => {
  const headers = Object.assign({ "X-Init-Data": INIT }, opts.headers || {});
  if (P2) headers["X-Page-Secret"] = P2;
  const r = await fetch(`/report/console${path}`, Object.assign({}, opts, { headers }));
  if (!r.ok && r.status !== 409) throw new Error((await r.text()) || r.status);
  return r;
};

$("unlock-btn").onclick = async () => {
  P2 = $("p2").value;
  $("unlock-err").textContent = "";
  try {
    await loadList();  // doubles as the password check
    try { sessionStorage.setItem("ris_report_pw", P2); } catch (e) {}
    $("unlock-card").classList.add("hidden");
    $("body").classList.remove("hidden");
    $("hdr-sub").classList.add("hidden");
  } catch (e) { $("unlock-err").textContent = "" + e.message; P2 = ""; }
};

// Auto-unlock from a previous session's saved password.
(function tryAutoUnlock() {
  let saved = "";
  try { saved = sessionStorage.getItem("ris_report_pw") || ""; } catch (e) {}
  if (saved) { $("p2").value = saved; $("unlock-btn").click(); }
})();

function fmtTs(ts) { return ts ? new Date(ts * 1000).toLocaleString() : "—"; }

function openReport(uuid) {
  // Persist the page password so the report page auto-unlocks on arrival, and
  // flag that we came from the console so the report shows a Back button.
  try {
    sessionStorage.setItem("ris_report_pw", P2);
    sessionStorage.setItem("ris_from_console", "1");
  } catch (e) {}
  location.href = `/report/${uuid}`;
}

async function loadList() {
  const r = await api("/api/list");
  const j = await r.json();
  ALL_REPORTS = j.reports;
  renderList();
}

let ALL_REPORTS = [];

function renderList() {
  const filter = $("status-filter").value;
  const reports = filter ? ALL_REPORTS.filter(r => r.status === filter) : ALL_REPORTS;
  const list = $("list");
  list.innerHTML = "";
  if (!reports.length) {
    list.innerHTML = `<div class="muted">${ALL_REPORTS.length ? "No reports match this filter." : "No reports yet."}</div>`;
    return;
  }
  for (const rep of reports) {
    const who = rep.username ? "@" + rep.username : "(no username)";
    const ncmec = rep.ncmec_report_id ? ` · NCMEC #${rep.ncmec_report_id}` : "";
    const el = document.createElement("div");
    el.className = "rep";
    el.innerHTML =
      `<div><div class="who">${escapeHtml(who)} · <span class="muted">${rep.user_id}</span></div>` +
      `<div class="meta"><code>${rep.uuid.slice(0, 8)}</code> · ${fmtTs(rep.created_at)}${ncmec}</div></div>` +
      `<span class="badge ${rep.status}">${rep.status}</span>`;
    el.onclick = () => openReport(rep.uuid);
    list.appendChild(el);
  }
}

$("status-filter").onchange = renderList;

$("refresh-btn").onclick = () => loadList().catch(e => { $("create-err").textContent = "" + e.message; });

$("create-btn").onclick = async () => {
  $("create-err").textContent = "";
  $("create-ok").classList.add("hidden");
  const target = $("target").value.trim();
  if (!target) { $("create-err").textContent = "Enter a user id, @username, or filename."; return; }
  try {
    const r = await api("/api/create", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ target }),
    });
    const j = await r.json();
    if (r.status === 409 && j.existing_uuid) {
      // Active report already exists — offer to open it.
      const ok = $("create-ok");
      ok.classList.remove("hidden");
      ok.innerHTML = `<div class="muted">${escapeHtml(j.error || "Active report already exists.")}</div>` +
        `<div style="height:8px"></div><button id="goto-existing">Open existing report</button>`;
      $("goto-existing").onclick = () => openReport(j.existing_uuid);
      return;
    }
    // Success — show the one-time image key (P1) and an open button.
    const ok = $("create-ok");
    ok.classList.remove("hidden");
    ok.innerHTML =
      `<div>Report created — encrypted <b>${j.encrypted}</b> file(s).</div>` +
      `<div style="margin:6px 0">Image key (P1): <code>${escapeHtml(j.p1)}</code> ` +
      `<span class="muted">(shown once — copy it)</span></div>` +
      `<button id="goto-new">Open report</button>`;
    $("goto-new").onclick = () => openReport(j.uuid);
    $("target").value = "";
    loadList().catch(() => {});
  } catch (e) { $("create-err").textContent = "" + e.message; }
};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ============ Tabs ============
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
    const isStats = t.dataset.tab === "stats";
    $("pane-reports").classList.toggle("hidden", isStats);
    $("pane-stats").classList.toggle("hidden", !isStats);
    if (isStats) loadStats().catch(e => { $("st-err").textContent = "" + e.message; });
  };
});

// ============ Statistics ============
let STATS = null;  // raw records from the server (filed only)
const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

function fmtLang(code) {
  if (!code) return "Unknown";
  try {
    const dn = new Intl.DisplayNames([navigator.language || "en"], { type: "language" });
    const name = dn.of(code);
    return name && name.toLowerCase() !== code.toLowerCase() ? `${name} (${code})` : code;
  } catch (e) { return code; }
}

async function loadStats() {
  $("st-err").textContent = "";
  if (!STATS) {
    const r = await api("/api/stats");
    STATS = (await r.json()).records || [];
    buildPeriodDropdowns();
  }
  renderStats();
}

// Year dropdown = every year that has a filed report (desc). Month dropdown =
// "Full year" + Jan..current (current year capped at this month; past years all 12).
function buildPeriodDropdowns() {
  const now = new Date();
  const years = [...new Set(STATS.map(r => new Date(r.finished_at * 1000).getFullYear()))].sort((a, b) => b - a);
  if (!years.includes(now.getFullYear())) years.unshift(now.getFullYear());
  const ysel = $("st-year");
  ysel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
  ysel.value = String(years[0]);
  ysel.onchange = () => { buildMonthDropdown(); renderStats(); };
  buildMonthDropdown();
}

function buildMonthDropdown() {
  const now = new Date();
  const year = parseInt($("st-year").value, 10);
  const lastMonth = year === now.getFullYear() ? now.getMonth() : 11;  // cap current year
  let opts = `<option value="all">Full year</option>`;
  for (let m = 0; m <= lastMonth; m++) opts += `<option value="${m}">${MONTHS[m]}</option>`;
  $("st-month").innerHTML = opts;
  $("st-month").value = "all";
  $("st-month").onchange = renderStats;
}

// Records filtered to the selected year + (optional) month, by filing date.
function selectedRecords() {
  const year = parseInt($("st-year").value, 10);
  const month = $("st-month").value;
  return STATS.filter(r => {
    const d = new Date(r.finished_at * 1000);
    if (d.getFullYear() !== year) return false;
    if (month !== "all" && d.getMonth() !== parseInt(month, 10)) return false;
    return true;
  });
}

function renderStats() {
  const recs = selectedRecords();
  // Aggregate file counts by their ACTUAL type (no forcing).
  const byType = {};
  let total = 0;
  for (const r of recs) {
    for (const [t, n] of Object.entries(r.file_types || {})) { byType[t] = (byType[t] || 0) + n; total += n; }
  }
  $("st-counter").textContent = total;
  renderFileBreakdown(byType);
  $("st-reports").textContent = recs.length;
  $("st-users").textContent = new Set(recs.map(r => r.user_id)).size;
  renderLangPie(recs);
  renderHeatmap(recs);
}

// Nice labels for the recorded Telegram file types.
const FILE_TYPE_LABEL = { photo: "Photos", video: "Videos", sticker: "Stickers", gif: "GIFs", document: "Documents", unknown: "Unknown" };

// One cell per file type actually present, separated by a thin divider line.
function renderFileBreakdown(byType) {
  const box = $("st-filebreak");
  box.innerHTML = "";
  const order = ["photo", "video", "sticker", "gif", "document", "unknown"];
  const types = order.filter(t => byType[t]).concat(Object.keys(byType).filter(t => !order.includes(t)));
  if (!types.length) { box.innerHTML = `<span class="muted">No files.</span>`; return; }
  types.forEach((t, i) => {
    if (i) box.insertAdjacentHTML("beforeend", `<div style="width:1px;height:34px;background:#363842;margin:0 14px"></div>`);
    box.insertAdjacentHTML("beforeend",
      `<div style="text-align:center"><div class="n2">${byType[t]}</div>` +
      `<div class="l">${escapeHtml(FILE_TYPE_LABEL[t] || t)}</div></div>`);
  });
}

// Palette for language slices (cycled). Toggling a chip drops that language from
// the pie and the percentages recompute over the remaining visible languages.
const PIE_COLORS = ["#54a0ff", "#3a6df0", "#8ac926", "#ffca3a", "#ff6b6b", "#a78bfa", "#26c6da", "#ff9f43", "#c44dff", "#95a5a6"];
let LANG_OFF = null;  // Set of language codes toggled off (persists across period changes)

function renderLangPie(recs) {
  const counts = {};
  for (const r of recs) { const k = r.language || ""; counts[k] = (counts[k] || 0) + 1; }
  // Stable order: biggest first, so colors stay put as the period changes.
  const langs = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  const color = {};
  langs.forEach((k, i) => { color[k] = PIE_COLORS[i % PIE_COLORS.length]; });
  if (LANG_OFF === null) LANG_OFF = new Set();

  // Chips (toggle) — one per language present in this period.
  const chips = $("st-lang-chips");
  chips.innerHTML = "";
  if (!langs.length) { chips.innerHTML = `<div class="muted">No data for this period.</div>`; }
  for (const k of langs) {
    const off = LANG_OFF.has(k);
    const chip = document.createElement("button");
    chip.className = "lang-chip" + (off ? " off" : "");
    chip.style.background = color[k];
    chip.innerHTML = `<span class="tick">${off ? "" : "✓"}</span>${escapeHtml(fmtLang(k))}`;
    chip.onclick = () => { if (LANG_OFF.has(k)) LANG_OFF.delete(k); else LANG_OFF.add(k); drawPie(counts, langs, color); paintChips(langs, color); };
    chips.appendChild(chip);
  }
  drawPie(counts, langs, color);
}

function paintChips(langs, color) {
  const chips = [...$("st-lang-chips").querySelectorAll(".lang-chip")];
  langs.forEach((k, i) => {
    const off = LANG_OFF.has(k);
    chips[i].classList.toggle("off", off);
    chips[i].querySelector(".tick").textContent = off ? "" : "✓";
  });
}

// Persistent per-language displayed fraction, so toggles animate (tweened via
// rAF; SVG path `d` can't be CSS-animated). Slices grow/shrink smoothly.
let PIE_CUR = {};        // lang -> currently displayed fraction (of the circle)
let PIE_RAF = null;      // active animation frame id (cancel on re-toggle)

// Draw/animate the pie over only the languages NOT toggled off; the visible
// slices' percentages recompute and the transition is animated.
function drawPie(counts, langs, color) {
  const visible = langs.filter(k => !LANG_OFF.has(k));
  const total = visible.reduce((s, k) => s + counts[k], 0);
  // Target fraction per language (0 for hidden/empty). New langs start at 0 → grow in.
  const target = {};
  for (const k of langs) { if (!(k in PIE_CUR)) PIE_CUR[k] = 0; target[k] = total ? (LANG_OFF.has(k) ? 0 : counts[k] / total) : 0; }
  const from = { ...PIE_CUR };
  const t0 = performance.now();
  const DUR = 350;
  if (PIE_RAF) cancelAnimationFrame(PIE_RAF);

  const step = now => {
    let e = Math.min(1, (now - t0) / DUR);
    e = 1 - Math.pow(1 - e, 3);  // easeOutCubic
    for (const k of langs) PIE_CUR[k] = from[k] + (target[k] - from[k]) * e;
    paintPie(langs, color);
    if (e < 1) { PIE_RAF = requestAnimationFrame(step); } else { PIE_RAF = null; }
  };
  PIE_RAF = requestAnimationFrame(step);
}

// Render the pie from the current PIE_CUR fractions (normalized to fill the circle).
function paintPie(langs, color) {
  const svg = $("st-pie");
  const cx = 100, cy = 100, rad = 96;
  const parts = langs.map(k => [k, PIE_CUR[k] || 0]).filter(([, f]) => f > 0.0005);
  const sum = parts.reduce((s, [, f]) => s + f, 0);
  if (sum < 0.0005) { svg.innerHTML = `<circle cx="100" cy="100" r="96" fill="#1b1d23"/>`; return; }
  // A single slice at ~100% can't be drawn as an arc (start==end) — use a circle.
  if (parts.length === 1) {
    svg.innerHTML = `<circle cx="100" cy="100" r="96" fill="${color[parts[0][0]]}"/>` + pieLabel(cx, cy - 40, "100%");
    return;
  }
  let angle = -Math.PI / 2;  // 12 o'clock
  let out = "";
  const labels = [];
  for (const [k, f] of parts) {
    const frac = f / sum;
    const end = angle + frac * 2 * Math.PI;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + rad * Math.cos(angle), y1 = cy + rad * Math.sin(angle);
    const x2 = cx + rad * Math.cos(end), y2 = cy + rad * Math.sin(end);
    out += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${rad},${rad} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${color[k]}"><title>${escapeHtml(fmtLang(k))}: ${Math.round(frac * 100)}%</title></path>`;
    if (frac >= 0.06) {
      const mid = angle + frac * Math.PI;
      const lr = rad * 0.6;
      labels.push(pieLabel(cx + lr * Math.cos(mid), cy + lr * Math.sin(mid), `${Math.round(frac * 100)}%`));
    }
    angle = end;
  }
  svg.innerHTML = out + labels.join("");
}

function pieLabel(x, y, text) {
  return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" fill="#fff" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="middle" style="pointer-events:none">${text}</text>`;
}

// Weekday×hour heatmap of ALL reported files' upload times in the selected period.
function renderHeatmap(recs) {
  const grid = Array.from({ length: 7 }, () => new Array(24).fill(0));
  let max = 0;
  for (const r of recs) {
    for (const ts of r.upload_times || []) {
      const d = new Date(ts * 1000);
      const v = ++grid[d.getDay()][d.getHours()];
      if (v > max) max = v;
    }
  }
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  let html = "<table><tr><td class='day'></td>";
  for (let h = 0; h < 24; h++) html += `<th class="hh">${h}</th>`;
  html += "</tr>";
  for (let d = 0; d < 7; d++) {
    html += `<tr><td class="day">${days[d]}</td>`;
    for (let h = 0; h < 24; h++) {
      const n = grid[d][h];
      const alpha = max ? 0.12 + 0.88 * (n / max) : 0;
      const bg = n ? `rgba(58,109,240,${alpha.toFixed(3)})` : "#1b1d23";
      html += `<td class="cell" style="background:${bg}" title="${days[d]} ${h}:00 — ${n}"></td>`;
    }
    html += "</tr>";
  }
  html += "</table>";
  $("st-heat").innerHTML = max ? html : `<div class="muted">No upload-time data for this period.</div>`;
}
</script>
